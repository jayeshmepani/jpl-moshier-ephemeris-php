name: Multi-OS Performance Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docs/benchmark/**'

permissions:
  contents: write

jobs:
  profile:
    name: Profile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ffi, opcache, fileinfo
          ini-values: ffi.enable=1, opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=100M
          coverage: none

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Compile C-Extension (Ubuntu & macOS)
        if: runner.os != 'Windows'
        run: |
          git clone -b 4.0.11 https://github.com/kevindecapite/php-sweph.git
          cd php-sweph && phpize && ./configure && make

      - name: Run Strict Audit
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            php docs/benchmark/UltimateBenchmark.php
          else
            php -d extension="$(pwd)/php-sweph/modules/swephp.so" docs/benchmark/UltimateBenchmark.php
          fi
          # The file is generated in the root, move it with a unique name
          mv comprehensive_benchmark_stats.json docs/benchmark/${{ matrix.os }}.json

      - name: Upload OS Stats
        uses: actions/upload-artifact@v4
        with:
          name: stats-${{ matrix.os }}
          path: docs/benchmark/${{ matrix.os }}.json

  consolidate:
    name: Generate Master Dashboard
    needs: profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Download All OS Stats
        uses: actions/download-artifact@v4
        with:
          path: docs/benchmark/
          pattern: stats-*
          merge-multiple: true

      - name: Generate Unified HTML
        run: php docs/benchmark/report_generator.php

      - name: Commit & Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmark/benchmark.html docs/benchmark/*.json
          git commit -m "chore: update multi-os performance audit results [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Final Audit Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: Full-Multi-OS-Performance-Audit
          path: |
            docs/benchmark/benchmark.html
            docs/benchmark/*.json
