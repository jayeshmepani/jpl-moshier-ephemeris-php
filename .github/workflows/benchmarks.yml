name: Multi-OS Performance Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docs/benchmark/**'

permissions:
  contents: write

jobs:
  profile:
    name: Profile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ffi, opcache, fileinfo
          ini-values: ffi.enable=1, opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=100M
          coverage: none

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Compile C-Extension (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          git clone --depth 1 -b 4.0.11 https://github.com/kevindecapite/php-sweph.git
          cd php-sweph && phpize && ./configure && make

      - name: Compile C-Extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth 1 -b 4.0.11 https://github.com/kevindecapite/php-sweph.git

          @'
          // vim:ft=javascript

          ARG_WITH("sweph", "for libswe support", "no");

          if (PHP_SWEPH != "no") {
              EXTENSION("swephp", "swephp.c", PHP_SWEPH_SHARED,
                  "/I \"" + configure_module_dirname + "\\sweph\\src\" /DZEND_ENABLE_STATIC_TSRMLS_CACHE=1");

              ADD_SOURCES(configure_module_dirname + "\\sweph\\src",
                  "swedate.c swehouse.c swejpl.c swemmoon.c swemplan.c sweph.c swephlib.c swecl.c swehel.c",
                  "swephp");

              AC_DEFINE("HAVE_SWEPH", 1, "Define to 1 if the PHP extension 'swephp' is available.");
          }
          '@ | Set-Content -Path php-sweph\config.w32 -Encoding ASCII

          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name BuildPhpExtension -Repository PSGallery -Force -Scope CurrentUser

          $phpVersion = php -r "echo PHP_MAJOR_VERSION . '.' . PHP_MINOR_VERSION;"
          $threadSafety = php -r "echo ZEND_THREAD_SAFE ? 'ts' : 'nts';"
          Write-Host "Building php-sweph for PHP $phpVersion ($threadSafety, x64)"

          Push-Location php-sweph
          Invoke-PhpBuildExtension -PhpVersion $phpVersion -Arch x64 -Ts $threadSafety -Args "--with-sweph=shared"
          Pop-Location

          $dll = Get-ChildItem -Path php-sweph -Recurse -Filter php_swephp.dll | Select-Object -First 1
          if (-not $dll) {
              Write-Error "php_swephp.dll was not produced by the Windows extension build."
              exit 1
          }

          Copy-Item -Path $dll.FullName -Destination docs\benchmark\php_swephp.dll -Force
          php -d extension="$(Resolve-Path docs\benchmark\php_swephp.dll)" -m | Select-String -SimpleMatch "swephp"

      - name: Run Strict Audit
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Load the Windows DLL if it was successfully built
            EXT_PATH="$(pwd)/docs/benchmark/php_swephp.dll"
            if [ -f "$EXT_PATH" ]; then
              php -d extension="$EXT_PATH" docs/benchmark/UltimateBenchmark.php
            else
              php docs/benchmark/UltimateBenchmark.php
            fi
          else
            php -d extension="$(pwd)/php-sweph/modules/swephp.so" docs/benchmark/UltimateBenchmark.php
          fi
          # The file is generated in the root, move it with a unique name
          mv comprehensive_benchmark_stats.json docs/benchmark/${{ matrix.os }}.json

      - name: Upload OS Stats
        uses: actions/upload-artifact@v4
        with:
          name: stats-${{ matrix.os }}
          path: docs/benchmark/${{ matrix.os }}.json

  consolidate:
    name: Generate Master Dashboard
    needs: profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Download All OS Stats
        uses: actions/download-artifact@v4
        with:
          path: docs/benchmark/
          pattern: stats-*
          merge-multiple: true

      - name: Generate Unified HTML
        run: php docs/benchmark/report_generator.php

      - name: Commit & Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmark/benchmark.html docs/benchmark/*.json
          git commit -m "chore: update multi-os performance audit results [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Final Audit Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: Full-Multi-OS-Performance-Audit
          path: |
            docs/benchmark/benchmark.html
            docs/benchmark/*.json
